# Crypto quotes source.
# Relative paths are resolved from this config file directory.
crypto_quotes_csv = fixture_crypto_quotes.csv
crypto_fees_csv =

# Output report with detected opportunities.
crypto_output_csv = ../crypto_opportunities.csv
profit_output_csv = ../crypto_profit.csv

# Crypto monitor settings.
crypto_symbol = BTCUSD
crypto_symbols = XTZUSD,APTUSD,ARBUSD
crypto_exchanges = BINANCE,KRAKEN,BITSTAMP,FXPRO,OANDA,PEPPERSTONE
crypto_default_fee_bps = 10.0
crypto_min_net_spread = 0.0
crypto_min_net_pct = 0.0
crypto_online_source = TRADINGVIEW

# Runtime behavior.
online_crypto_enabled = true
watch_interval_sec = 5
profit_calc_enabled = true
start_capital = 1000.0
no_fixtures = false
